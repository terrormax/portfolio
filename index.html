<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aryan -- 3D Creator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { kanit: ['Kanit', 'sans-serif'] },
                    colors: { dark: '#0C0C0C', main: '#D7E2EA' }
                }
            }
        }
    </script>
    <style>
        .hero-heading {
            background: linear-gradient(180deg, #646973 0%, #BBCCD7 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .text-clamp-heading { font-size: clamp(3rem, 12vw, 160px); }
        .text-clamp-p { font-size: clamp(0.75rem, 1.4vw, 1.5rem); }
        .text-clamp-about { font-size: clamp(1rem, 2vw, 1.35rem); }
        .transition-custom { transition: all 0.6s cubic-bezier(0.215, 0.61, 0.355, 1); }
        .will-change-transform { will-change: transform; }
    </style>
</head>
<body class="bg-dark font-kanit">

    <div class="main-wrapper">
        <!-- 1. HERO SECTION -->
        <section id="hero" class="h-screen flex flex-col justify-between px-6 md:px-10 overflow-x-clip relative">
            <nav class="flex justify-between items-center pt-6 md:pt-8 text-main font-medium uppercase tracking-wider text-sm md:text-lg lg:text-[1.4rem]">
                <a href="#about" class="hover:opacity-70 transition-opacity">About</a>
                <a href="#price" class="hover:opacity-70 transition-opacity">Price</a>
                <a href="#projects" class="hover:opacity-70 transition-opacity">Projects</a>
                <a href="#contact" class="hover:opacity-70 transition-opacity">Contact</a>
            </nav>

            <div class="relative flex-1 flex flex-col justify-center">
                <div class="overflow-hidden">
                    <h1 class="hero-heading font-black uppercase tracking-tight leading-none whitespace-nowrap w-full text-[14vw] sm:text-[15vw] md:text-[16vw] lg:text-[17.5vw] mt-6 sm:mt-4 md:-mt-5 transform translate-y-[40px] opacity-0 animate-reveal">
                        Hi, i&apos;m aryan
                    </h1>
                </div>

                <div id="magnet-wrap" class="absolute left-1/2 -translate-x-1/2 z-10 bottom-0 w-[280px] sm:w-[360px] md:w-[440px] lg:w-[520px] pointer-events-none">
                    <img src="https://shrug-person-78902957.figma.site/_components/v2/d24c01ad3a56fc65e942a1f501eb73db42d7cf9a/Rectangle_40443.81459862.png" 
                         alt="Aryan" class="w-full h-auto pointer-events-auto">
                </div>
            </div>

            <div class="flex justify-between items-end pb-7 sm:pb-8 md:pb-10 relative z-20">
                <p class="text-main font-light uppercase tracking-wide leading-snug max-w-[160px] sm:max-w-[220px] md:max-w-[260px] text-clamp-p opacity-0 translate-y-5 animate-reveal-delay">
                    a 3d creator driven by crafting striking and unforgettable projects
                </p>
                <button class="group flex items-center gap-4 bg-main text-dark px-6 py-3 md:px-8 md:py-4 rounded-full font-black uppercase tracking-widest text-sm md:text-base hover:scale-105 transition-all">
                    Get in touch
                    <div class="bg-dark rounded-full p-1 group-hover:rotate-45 transition-transform">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#D7E2EA" stroke-width="3" stroke-linecap="round"><path d="M7 17L17 7M17 7H7M17 7V17"/></svg>
                    </div>
                </button>
            </div>
        </section>

        <!-- 2. MARQUEE SECTION -->
        <section id="marquee" class="bg-dark pt-24 sm:pt-32 md:pt-40 pb-10 overflow-hidden">
            <div id="m-row-1" class="flex gap-3 will-change-transform mb-3"></div>
            <div id="m-row-2" class="flex gap-3 will-change-transform"></div>
        </section>

        <!-- 3. ABOUT SECTION -->
        <section id="about" class="min-h-screen relative px-5 sm:px-8 md:px-10 py-20 flex flex-col items-center justify-center text-center overflow-hidden">
            <!-- Decorative Icons -->
            <img src="https://shrug-person-78902957.figma.site/_components/v2/ebb2b8f25d8e24d5f0a5ca8af4c950de81aa2fd7/moon_icon.11395d36.png" class="absolute top-[4%] left-[4%] w-[120px] md:w-[210px] transform -translate-x-20 opacity-0 scroll-reveal" data-dir="left" alt="">
            <img src="https://shrug-person-78902957.figma.site/_components/v2/ebb2b8f25d8e24d5f0a5ca8af4c950de81aa2fd7/lego_icon-1.703bb594.png" class="absolute top-[4%] right-[4%] w-[120px] md:w-[210px] transform translate-x-20 opacity-0 scroll-reveal" data-dir="right" alt="">
            
            <h2 class="hero-heading font-black uppercase leading-none tracking-tight text-clamp-heading mb-16">About me</h2>
            
            <div class="max-w-[560px]">
                <p id="about-text" class="text-main font-medium leading-relaxed text-clamp-about mb-20"></p>
                <button class="bg-main text-dark px-10 py-4 rounded-full font-black uppercase tracking-widest text-base mx-auto">Contact me</button>
            </div>

            <img src="https://shrug-person-78902957.figma.site/_components/v2/ebb2b8f25d8e24d5f0a5ca8af4c950de81aa2fd7/p59_1.4659672e.png" class="absolute bottom-[8%] left-[10%] w-[100px] md:w-[180px] transform -translate-x-20 opacity-0 scroll-reveal" data-dir="left" alt="">
            <img src="https://shrug-person-78902957.figma.site/_components/v2/ebb2b8f25d8e24d5f0a5ca8af4c950de81aa2fd7/Group_134-1.2e04f3ce.png" class="absolute bottom-[8%] right-[10%] w-[130px] md:w-[220px] transform translate-x-20 opacity-0 scroll-reveal" data-dir="right" alt="">
        </section>

        <!-- 4. SERVICES SECTION -->
        <section class="bg-white rounded-t-[40px] md:rounded-t-[60px] px-5 sm:px-8 md:px-10 py-20 md:py-32 relative z-20 text-dark">
            <h2 class="font-black uppercase text-center text-clamp-heading mb-20">Services</h2>
            <div id="services-target" class="max-w-5xl mx-auto"></div>
        </section>

        <!-- 5. PROJECTS SECTION -->
        <section id="projects" class="bg-dark rounded-t-[40px] md:rounded-t-[60px] -mt-14 relative z-30 px-5 sm:px-10 pb-20">
            <div class="py-20 md:py-32">
                <h2 class="hero-heading font-black uppercase text-center text-clamp-heading">Project</h2>
            </div>
            <div id="project-stack" class="relative"></div>
        </section>
    </div>

    <script>
        /** ENGINE CONFIGURATION **/
        const images = [
            "https://motionsites.ai/assets/hero-space-voyage-preview-eECLH3Yc.gif",
            "https://motionsites.ai/assets/hero-codenest-preview-Cgppc2qV.gif",
            "https://motionsites.ai/assets/hero-vex-ventures-preview-BczMFIiw.gif",
            "https://motionsites.ai/assets/hero-stellar-ai-v2-preview-DjvxjG3C.gif",
            "https://motionsites.ai/assets/hero-asme-preview-B_nGDnTP.gif",
            "https://motionsites.ai/assets/hero-transform-data-preview-Cx5OU29N.gif",
            "https://motionsites.ai/assets/hero-vitara-preview-Cjz2QYyU.gif",
            "https://motionsites.ai/assets/hero-terra-preview-BFjrCr7T.gif",
            "https://motionsites.ai/assets/hero-skyelite-preview-DHaZIgUv.gif",
            "https://motionsites.ai/assets/hero-aethera-preview-DknSlcTa.gif",
            "https://motionsites.ai/assets/hero-designpro-preview-D8c5_een.gif"
        ];

        const services = [
            { id: "01", name: "3D Modeling", desc: "Creation of detailed objects, characters, or environments tailored to specific client needs." },
            { id: "02", name: "Rendering", desc: "High-quality, photorealistic renders that showcase designs with custom lighting and textures." },
            { id: "03", name: "Motion Design", desc: "Dynamic animations and motion graphics that add energy and storytelling to brands." },
            { id: "04", name: "Branding", desc: "Crafting cohesive visual identities communication clear and memorable presence." },
            { id: "05", name: "Web Design", desc: "Designing clean, modern, and conversion-focused websites with attention to layout." }
        ];

        /** INITIALIZATION ENGINE **/
        function init() {
            // Populate Marquee
            const row1 = document.getElementById('m-row-1');
            const row2 = document.getElementById('m-row-2');
            const repeat = [...images, ...images, ...images];
            
            repeat.forEach(url => {
                row1.innerHTML += `<img src="${url}" class="w-[420px] h-[270px] rounded-2xl object-cover shrink-0" loading="lazy">`;
            });
            repeat.reverse().forEach(url => {
                row2.innerHTML += `<img src="${url}" class="w-[420px] h-[270px] rounded-2xl object-cover shrink-0" loading="lazy">`;
            });

            // Split Characters for About
            const aboutP = document.getElementById('about-text');
            const text = "With more than three years of experience in design, i focus on branding, web design, and user experience, i truly enjoy working with businesses that aim to stand out and present their best image. Let's build something incredible together!";
            aboutP.innerHTML = text.split('').map(char => `<span class="opacity-20 transition-opacity duration-300 transform">${char}</span>`).join('');

            // Populate Services
            const sTarget = document.getElementById('services-target');
            services.forEach(s => {
                sTarget.innerHTML += `
                    <div class="flex items-center gap-6 md:gap-12 py-8 md:py-12 border-b border-black/15">
                        <span class="font-black text-dark text-[10vw] md:text-[8rem] leading-none">${s.id}</span>
                        <div>
                            <h3 class="font-medium uppercase text-xl md:text-3xl">${s.name}</h3>
                            <p class="font-light opacity-60 text-base md:text-xl max-w-2xl">${s.desc}</p>
                        </div>
                    </div>`;
            });

            // Populate Projects
            const pStack = document.getElementById('project-stack');
            for(let i=0; i<3; i++) {
                pStack.innerHTML += `
                    <div class="project-container h-[85vh] sticky top-24 md:top-32 mb-10">
                        <div class="project-card h-full w-full bg-dark border-2 border-main rounded-[40px] md:rounded-[60px] p-6 md:p-10 flex flex-col gap-8 transition-transform will-change-transform" style="top: ${i*28}px">
                            <div class="flex justify-between items-center">
                                <div class="flex items-center gap-8">
                                    <span class="font-black text-6xl md:text-8xl">0${i+1}</span>
                                    <div>
                                        <p class="uppercase text-sm opacity-50 tracking-widest">3D / GRAPHIC</p>
                                        <h3 class="text-2xl md:text-4xl font-bold uppercase">Solaris Hub #${i+1}</h3>
                                    </div>
                                </div>
                                <button class="hidden md:block border-2 border-main rounded-full px-8 py-3 font-bold uppercase tracking-widest hover:bg-main hover:text-dark">Live Project</button>
                            </div>
                            <div class="grid grid-cols-10 gap-4 flex-1">
                                <div class="col-span-4 flex flex-col gap-4">
                                     <img src="${images[i]}" class="w-full h-1/2 object-cover rounded-[30px] md:rounded-[40px]">
                                     <img src="${images[i+1]}" class="w-full h-1/2 object-cover rounded-[30px] md:rounded-[40px]">
                                </div>
                                <div class="col-span-6 h-full">
                                    <img src="${images[i+5]}" class="w-full h-full object-cover rounded-[30px] md:rounded-[40px]">
                                </div>
                            </div>
                        </div>
                    </div>`;
            }
        }

        /** LOGIC ENGINE: Magnetic & Scroll **/
        window.addEventListener('mousemove', (e) => {
            const magnet = document.getElementById('magnet-wrap');
            const rect = magnet.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            const dist = Math.hypot(e.clientX - centerX, e.clientY - centerY);

            if (dist < 150) {
                const moveX = (e.clientX - centerX) / 3;
                const moveY = (e.clientY - centerY) / 3;
                magnet.style.transform = `translate(calc(-50% + ${moveX}px), ${moveY}px)`;
            } else {
                magnet.style.transform = `translate(-50%, 0)`;
            }
        });

        window.addEventListener('scroll', () => {
            const scrolled = window.scrollY;
            
            // Marquee logic
            document.getElementById('m-row-1').style.transform = `translateX(${scrolled * 0.3 - 200}px)`;
            document.getElementById('m-row-2').style.transform = `translateX(${-scrolled * 0.3}px)`;

            // About character logic
            const aboutSection = document.getElementById('about');
            const aboutChars = document.querySelectorAll('#about-text span');
            const rect = aboutSection.getBoundingClientRect();
            const progress = Math.max(0, Math.min(1, (window.innerHeight - rect.top) / rect.height));
            
            aboutChars.forEach((char, i) => {
                const threshold = i / aboutChars.length;
                char.style.opacity = progress > threshold ? 1 : 0.2;
            });

            // Card Stack Scale logic
            const cards = document.querySelectorAll('.project-card');
            cards.forEach((card, index) => {
                const cardRect = card.parentElement.getBoundingClientRect();
                if (cardRect.top < 100) {
                    const scale = 1 - (Math.abs(cardRect.top) / 3000) - ( (cards.length - 1 - index) * 0.03 );
                    card.style.transform = `scale(${Math.max(0.85, scale)})`;
                }
            });
        });

        // Trigger Reveal Animations
        document.addEventListener('DOMContentLoaded', () => {
            init();
            setTimeout(() => {
                document.querySelectorAll('.animate-reveal, .animate-reveal-delay').forEach(el => {
                    el.style.opacity = "1";
                    el.style.transform = "translateY(0)";
                    el.classList.add('transition-custom');
                });
            }, 100);
        });

    </script>
    <style>
        .animate-reveal { transition: all 0.8s cubic-bezier(0.2, 0.8, 0.2, 1); }
        .animate-reveal-delay { transition: all 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) 0.3s; }
        .scroll-reveal { transition: all 1s ease-out; }
    </style>
</body>
</html>
